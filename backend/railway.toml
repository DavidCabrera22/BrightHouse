[build]
builder = "nixpacks"
buildCommand = "npm --prefix ../frontend ci && npm --prefix ../frontend run build && rm -rf public && cp -r ../frontend/dist public && npm run build"

[deploy]
startCommand = "node dist/main"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
