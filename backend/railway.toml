[build]
builder = "nixpacks"
buildCommand = "cd ../frontend && npm ci && npm run build && cd - && rm -rf public && cp -r ../frontend/dist public && npm run build"

[deploy]
startCommand = "node dist/main"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
